name: nunchuk-window-x86_64

on:
  push:
    tags:
    - '*'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        
      - name: Check Windows Version
        shell: pwsh
        run: systeminfo | findstr /B /C:"OS Name" /C:"OS Version"

      - name: Setup msbuild
        uses: microsoft/setup-msbuild@v2
        with:
            msbuild-architecture: x64

      - name: Install CMake 3.31.0
        shell: pwsh
        run: |
          $version = "3.31.0"
          $uri = "https://github.com/Kitware/CMake/releases/download/v$version/cmake-$version-windows-x86_64.zip"
          $zipPath = "$env:TEMP\cmake.zip"
          $cmakeDir = "$env:ProgramFiles\CMake"
      
          Invoke-WebRequest -Uri $uri -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $cmakeDir -Force
      
          $binPath = "$cmakeDir\cmake-$version-windows-x86_64\bin"
          echo "$binPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
      - name: Check CMake version
        run: cmake --version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install aqtinstall
        run: |
          pip install aqtinstall
  
      - name: Install Qt 5.15.2 (MSVC 2019)
        run: |
          aqt list-qt windows desktop --modules 5.15.2 win64_msvc2019_64
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 --outputdir C:\qt
          aqt install-qt windows desktop 5.15.2 win64_msvc2019_64 --outputdir C:\qt -m  qtcharts `
                                                                                        qtdatavis3d `
                                                                                        qtlottie `
                                                                                        qtnetworkauth `
                                                                                        qtpurchasing `
                                                                                        qtquick3d `
                                                                                        qtquicktimeline `
                                                                                        qtscript `
                                                                                        qtvirtualkeyboard `
                                                                                        qtwebengine `
                                                                                        qtwebglplugin `
                                                                                        debug_info
                                                                  
          Write-Host "Qt installed at: $qtPath\windows\desktop\$qtVersion\msvc2019_64"
      
      - name: Print Qt installation path
        run: |
          echo "Qt installed at: C:\qt\5.15.2\msvc2019_64"
          dir C:\qt\5.15.2\msvc2019_64
          dir C:\qt\5.15.2\msvc2019_64\bin
          echo "QT_DIR=C:\qt\5.15.2\msvc2019_64" >> $GITHUB_ENV

          echo "Check bin"
          Get-ChildItem "C:\qt\5.15.2\msvc2019_64\bin"
      
      - name: Setup Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.workspace }}/vcpkg
            ${{ runner.workspace }}/vcpkg/installed
          key: vcpkg-full-${{ runner.os }}-${{ github.ref }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: |
            vcpkg-full-${{ runner.os }}-

      - name: Set up vcpkg
        working-directory: ${{ runner.workspace }}
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git
          cd vcpkg
          echo "Checkout version f523208df4ae467436dc2d2eeab594fed240d552"
          git checkout f523208df4ae467436dc2d2eeab594fed240d552
          .\bootstrap-vcpkg.bat
          
      - name: Install dependencies with vcpkg
        working-directory: ${{ runner.workspace }}
        shell: pwsh
        run: |
          vcpkg\vcpkg.exe install boost:x64-windows `
                                  zeromq:x64-windows `
                                  libevent:x64-windows `
                                  berkeleydb:x64-windows `
                                  sqlite3:x64-windows `
                                  sqlcipher:x64-windows
                        
          vcpkg\vcpkg.exe integrate install
          vcpkg\vcpkg.exe list

      - name: Checkout Olm
        working-directory: ${{ runner.workspace }}
        run: git clone https://gitlab.matrix.org/matrix-org/olm.git
      
      - name: Build Olm
        working-directory: ${{ runner.workspace }}/olm
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          
      - name: Checkout QtKeychain
        working-directory: ${{ runner.workspace }}
        run: |
          git clone https://github.com/frankosterfeld/qtkeychain.git
      
      - name: Build QtKeychain
        working-directory: ${{ runner.workspace }}/qtkeychain
        run: |
          cmake -B build -S . `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE=${{ runner.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_INSTALL_PREFIX="C:/qtkeychainInstalled" `
            -DQt5_DIR="C:\Qt\5.15.2\msvc2019_64\lib\cmake\Qt5"
            
          cmake --build build --config Release
          cmake --install build --config Release
          echo "QTKEYCHAIN_PATH=C:/qtkeychainInstalled" >> $GITHUB_ENV
          
          # ✅ Copy DLL vào Qt bin
          $src = "C:/qtkeychainInstalled/bin/qt5keychain.dll"
          $dst = "C:/Qt/5.15.2/msvc2019_64/bin/qt5keychain.dll"
          if (Test-Path $src) {
            Copy-Item $src -Destination $dst -Force
            Write-Host "✅ Copied qt5keychain.dll to Qt bin folder"
          } else {
            Write-Error "❌ qt5keychain.dll not found at $src"
            exit 1
          }

      - name: Locate all libssl and libcrypto files
        shell: pwsh
        run: |
          $patterns = @("libssl*", "libcrypto*")
          $roots = @("C:\", "D:\")
          foreach ($pattern in $patterns) {
            foreach ($root in $roots) {
              Write-Host "🔍 Searching for $pattern under $root..."
              Get-ChildItem -Path $root -Recurse -ErrorAction SilentlyContinue -Include "$pattern.*" |
                Where-Object { -not $_.PSIsContainer } |
                ForEach-Object {
                  Write-Host "📄 $($_.FullName)"
                }
            }
          }
          
      - name: Checkout nunchuk-qt
        working-directory: ${{ runner.workspace }}
        env:
          GITLAB_PASS: ${{ secrets.GITLAB_PASS }}
        shell: pwsh
        run: |
          # Tạo ~/.netrc
          $netrcContent = "machine gitlab.com`n  login hadvluffy`n  password $env:GITLAB_PASS"
          $netrcPath = "$env:USERPROFILE\.netrc"
          $netrcContent | Out-File -FilePath $netrcPath -Encoding ASCII
      
          # Set biến môi trường
          $env:TARGET_BRANCH = "dev"
          echo "BUILD_BRANCH=$env:TARGET_BRANCH" >> $env:GITHUB_ENV
      
          echo "Cloning fresh repository"
          if (Test-Path "nunchuk-qt") { Remove-Item -Recurse -Force "nunchuk-qt" }
          git clone -b $env:TARGET_BRANCH https://gitlab.com/nunchuck/nunchuck-qt nunchuk-qt
          Set-Location nunchuk-qt
          git fetch --all --tags --force
          git submodule sync --recursive
          git submodule update --init --recursive
      
          $lastCommit = git rev-parse HEAD
          echo "Latest commit ----->>>>> $lastCommit"
          echo "LAST_COMMITID=$lastCommit" >> $env:GITHUB_ENV
      
          $latestTag = git for-each-ref --sort=-taggerdate --format '%(refname:short)' refs/tags | Select-Object -First 1
          $currentCommit = git rev-parse HEAD
          $taggedCommit = git rev-list -n 1 $latestTag
          echo "Latest tag found: $latestTag (commit $taggedCommit)"
          echo "Current commit: $currentCommit"
          echo "LATEST_VERSION=$latestTag" >> $env:GITHUB_ENV
      
      - name: Generate build timestamp
        shell: pwsh
        run: |
          $timestamp = Get-Date -Format "yyyyMMddHHmmss"
          echo "Timestamp: $timestamp"
          echo "TIMESTAMP=$timestamp" >> $env:GITHUB_ENV

      - name: Check environment variants
        id: set-timestamp
        run: |
          echo "Timestamp build :>>> ${{ env.TIMESTAMP }}"
          echo "Version target build :>>> ${{ env.LATEST_VERSION }}"
          echo "Commit target build :>>> ${{ env.LAST_COMMITID }}"
          echo "Branch target build :>>> ${{ env.BUILD_BRANCH }}"
          
      - name: Configuration nunchuk-qt
        shell: pwsh
        env:
          toolchainFile: ${{ runner.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake
          project_path: ${{ runner.workspace }}/nunchuk-qt
          qt_installed: C:/qt/5.15.2/msvc2019_64/lib/cmake/Qt5
          qt_keychain_installed: C:/qtkeychainInstalled
          build_mode: Release
          # OAuth secrets: giữ đồng bộ với workflow Linux/macOS.
          # Lưu ý: cmake bên Linux/macOS đọc 3 secret này qua biến môi trường,
          # nên ở đây chỉ cần expose ra env là CMake script nhận được.
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REDIRECT_URI: ${{ secrets.OAUTH_REDIRECT_URI }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          $qtDir = ${{ env.QT_DIR }}
          $qtKeychain = ${{ env.QTKEYCHAIN_PATH }}
          echo "Qt path :>>> $qtDir"
          echo "Qt keychain path :>>> $qtKeychain"

          $cmakeConfigureCmd = @(
            "-G", "Visual Studio 17 2022",
            "-A", "x64",
            "-B", "build",
            "-S", "$env:project_path",
            "-DCMAKE_BUILD_TYPE=$env:build_mode",
            "-DCMAKE_TOOLCHAIN_FILE=$env:toolchainFile",
            "-DVCPKG_TARGET_TRIPLET=x64-windows",
            "-DUR__DISABLE_TESTS=ON",
            "-DQt5_DIR=$env:qt_installed",
            "-DCMAKE_PREFIX_PATH=$env:qt_keychain_installed",
            "-D_WIN32_WINNT=0x0601"
          )
          cmake @cmakeConfigureCmd
          
      - name: Build nunchuk-qt
        shell: pwsh
        env:
          build_mode: Release
        run: |
          $cmakeBuildCmd = @(
            "--build", 
            "build", 
            "--config", 
            "$env:build_mode", 
            "--", 
            "/m:4"
          )
          cmake @cmakeBuildCmd

      - name: Deploy with windeployqt
        shell: pwsh
        env:
          project_path: ${{ runner.workspace }}\nunchuk-qt
          windeployqt_exe: C:\qt\5.15.2\msvc2019_64\bin\windeployqt.exe
        run: |
          Get-ChildItem "${{ runner.workspace }}"
          $windeployqt = "$env:windeployqt_exe"
          $nunchuk_qt = "build\Release\nunchuk-qt.exe"

          if (!(Test-Path $windeployqt)) {
            Write-Error "❌ windeployqt not found at $windeployqt"
            exit 1
          }

          if (!(Test-Path $nunchuk_qt)) {
            Write-Error "❌ Executable not found at $nunchuk_qt"
            exit 1
          }

          & $windeployqt `
            "--release" `
            "--no-translations" `
            "--verbose=2" `
            $nunchuk_qt `
            "--qmldir" $env:project_path

      # ----------------------------------------------------------------------
      # Stage toàn bộ runtime vào 1 thư mục sạch (staging).
      # windeployqt chỉ copy DLL của Qt -> phải copy thêm DLL bên thứ ba
      # từ vcpkg (boost, zeromq, libevent, sqlcipher, openssl, ...) và
      # qt5keychain.dll, nếu không app sẽ thiếu DLL khi chạy trên máy sạch.
      # ----------------------------------------------------------------------
      - name: Stage application files
        shell: pwsh
        env:
          vcpkg_bin: ${{ runner.workspace }}/vcpkg/installed/x64-windows/bin
          qtkeychain_dll: C:/qtkeychainInstalled/bin/qt5keychain.dll
        run: |
          $stage = "staging"
          if (Test-Path $stage) { Remove-Item -Recurse -Force $stage }
          New-Item -ItemType Directory -Path $stage | Out-Null

          # 1) Copy exe + tất cả DLL Qt mà windeployqt đã sinh trong build\Release
          Copy-Item -Path "build\Release\*" -Destination $stage -Recurse -Force
          Write-Host "✅ Copied build\Release\* to $stage"

          # 2) Copy DLL bên thứ ba (release) từ vcpkg.
          #    vcpkg để DLL debug trong /bin và DLL debug trong /debug/bin;
          #    /installed/x64-windows/bin là bản release.
          if (Test-Path $env:vcpkg_bin) {
            Get-ChildItem -Path $env:vcpkg_bin -Filter *.dll | ForEach-Object {
              Copy-Item $_.FullName -Destination $stage -Force
              Write-Host "📌 Copied vcpkg DLL: $($_.Name)"
            }
          } else {
            Write-Error "❌ vcpkg bin dir not found at $env:vcpkg_bin"
            exit 1
          }

          # 3) Đảm bảo qt5keychain.dll có mặt (bước build QtKeychain đã copy
          #    vào Qt bin, windeployqt có thể đã kéo theo; copy lại cho chắc).
          if (Test-Path $env:qtkeychain_dll) {
            Copy-Item $env:qtkeychain_dll -Destination $stage -Force
            Write-Host "📌 Copied qt5keychain.dll"
          } else {
            Write-Host "⚠️ qt5keychain.dll not found at $env:qtkeychain_dll (có thể đã nằm trong build\Release)"
          }

          Write-Host "---- Staging contents ----"
          Get-ChildItem $stage | Select-Object Name, Length

      # ----------------------------------------------------------------------
      # Bundle HWI (hardware wallet) cho Windows - đồng bộ với Linux/macOS.
      # ----------------------------------------------------------------------
      - name: Download and bundle HWI
        shell: pwsh
        env:
          HWI_URL: https://github.com/nogibi/HWI/releases/download/3.2.0-displayaddress/hwi-3.2.0-windows-x86_64.zip
        run: |
          $stage = "staging"
          $zip = "$env:TEMP\hwi.zip"
          $out = "$env:TEMP\hwi-extracted"

          Write-Host "Downloading HWI from $env:HWI_URL"
          Invoke-WebRequest -Uri $env:HWI_URL -OutFile $zip
          if (Test-Path $out) { Remove-Item -Recurse -Force $out }
          Expand-Archive -Path $zip -DestinationPath $out -Force

          # Tìm hwi.exe trong gói giải nén (đề phòng cấu trúc thư mục lồng nhau)
          $hwi = Get-ChildItem -Path $out -Recurse -Filter "hwi.exe" | Select-Object -First 1
          if ($null -eq $hwi) {
            Write-Error "❌ hwi.exe not found in extracted HWI archive"
            Get-ChildItem -Path $out -Recurse | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }
          Copy-Item $hwi.FullName -Destination $stage -Force
          Write-Host "✅ Bundled $($hwi.Name) into $stage"

      # ----------------------------------------------------------------------
      # Tạo installer bằng Inno Setup.
      # ----------------------------------------------------------------------
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          # ISCC.exe thường nằm tại đây trên windows-latest:
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            Write-Error "❌ ISCC.exe not found at $iscc"
            exit 1
          }
          echo "ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Generate Inno Setup script
        shell: pwsh
        run: |
          # Inno Setup yêu cầu AppVersion dạng số x.y.z; tag có thể có tiền tố/hậu tố.
          # Lấy phần số đầu tiên, fallback 0.0.0 nếu không match.
          $rawVersion = "${{ env.LATEST_VERSION }}"
          if ($rawVersion -match '(\d+(\.\d+){1,3})') { $appVersion = $Matches[1] } else { $appVersion = "0.0.0" }
          echo "APP_VERSION=$appVersion" >> $env:GITHUB_ENV
          Write-Host "Installer AppVersion = $appVersion (from tag '$rawVersion')"

          $iss = @"
          #define MyAppName "Nunchuk"
          #define MyAppVersion "$appVersion"
          #define MyAppExeName "nunchuk-qt.exe"

          [Setup]
          AppId={{8F1B9C2A-4D3E-4A21-9C7B-1E2F3A4B5C6D}}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher=Nunchuk
          DefaultDirName={autopf}\{#MyAppName}
          DefaultGroupName={#MyAppName}
          OutputDir=installer
          OutputBaseFilename=nunchuk-windows-v$appVersion-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64
          ArchitecturesInstallIn64BitMode=x64
          WizardStyle=modern

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "staging\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs ignoreversion

          [Icons]
          Name: "{group}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{group}\{cm:UninstallProgram,{#MyAppName}}"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path "nunchuk.iss" -Value $iss -Encoding UTF8
          Write-Host "---- nunchuk.iss ----"
          Get-Content "nunchuk.iss"

      - name: Build installer with Inno Setup
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer" -Force | Out-Null
          & "${{ env.ISCC }}" "nunchuk.iss"
          Write-Host "---- installer dir ----"
          Get-ChildItem "installer"

      - name: Zip deployed release folder
        shell: pwsh
        run: |
          $src = "staging"
          $dst = "nunchuk-qt-win.zip"
          if (!(Test-Path $src)) {
            Write-Error "❌ Cannot zip: Folder $src does not exist"
            exit 1
          }
          Compress-Archive -Path "$src\*" -DestinationPath $dst -Force
          Write-Host "✅ Zipped $src to $dst"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: nunchuk-windows-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}
          path: installer/*.exe

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: nunchuk-windows-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}-built
          path: nunchuk-qt-win.zip
