name: nunchuk-macos-matrix

# Flag bật/tắt việc zip + upload artifact "-built".
# Mặc định 'false' (không tạo zip, không upload). Đổi thành 'true' khi cần lại.
env:
  UPLOAD_BUILT: 'false'

on:
  push:
    tags:
    - '*'

  workflow_dispatch:

jobs:
  build:
    # Build tách biệt 2 bản: Intel (x86_64) và Apple Silicon (arm64).
    # Mỗi phần tử matrix chạy trên runner đúng kiến trúc -> binary native.
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Homebrew prefix khác nhau theo kiến trúc:
      #   Intel  -> /usr/local
      #   Apple Silicon -> /opt/homebrew
      # Bắt động để mọi bước dùng chung, tránh hardcode.
      - name: Set Homebrew prefix
        run: |
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          echo "Homebrew prefix = $(brew --prefix) (arch: ${{ matrix.arch }})"
      - name: Checkout HWI
        working-directory: ${{runner.workspace}}
        run: |
          xcode-select -p
          xcodebuild -version
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
          job_runs_id="25678039176"
          gh run download $job_runs_id -n "hwi_macos.zip" --repo hadvluffy/macdeploynunchuk
          unzip hwi_macos.zip
          echo "ls -l"
          ls -l 
          echo "ls -l hwi_macos"
          ls -l hwi_macos
          
      - name: Checkout nunchuk-qt
        working-directory: ${{runner.workspace}}
        env:
          GITLAB_PASS: ${{ secrets.GITLAB_PASS }}
        run: |
          echo -e "machine gitlab.com\n  login tongvanlinhqhi\n  password $GITLAB_PASS" >~/.netrc
          TARGET_BRANCH="qt6"
          echo "BUILD_BRANCH=$TARGET_BRANCH" >> $GITHUB_ENV
          echo "Cloning fresh repository"
          rm -rf nunchuk-qt
          git clone -b $TARGET_BRANCH https://gitlab.com/nunchuck/nunchuck-qt nunchuk-qt
          cd nunchuk-qt
          git fetch --all --tags --prune
          git submodule sync --recursive
          git submodule update --init --recursive
          echo "Latest commit ----->>>>> $(git rev-parse HEAD)"
          echo "LAST_COMMITID=$(git rev-parse HEAD)" >> $GITHUB_ENV
          # Get the latest tag based on the time it was tagged (taggerdate)
          LATEST_TAG=$(git for-each-ref --sort=-taggerdate --format '%(refname:short)' refs/tags | head -n 1)
          CURRENT_COMMIT=$(git rev-parse HEAD)
          TAGGED_COMMIT=$(git rev-list -n 1 $LATEST_TAG)
          echo "Latest tag found: $LATEST_TAG (commit $TAGGED_COMMIT)"
          echo "Current commit: $CURRENT_COMMIT"
          echo "LATEST_VERSION=$LATEST_TAG" >> $GITHUB_ENV
      - name: Generate build timestamp
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          echo "Timestamp: $TIMESTAMP"
          echo "TIMESTAMP=$TIMESTAMP" >> $GITHUB_ENV
          
      - name: Check environment variants
        id: set-timestamp
        run: |
          echo "Timestamp build :>>> ${{ env.TIMESTAMP }}"
          echo "Version target build :>>> ${{ env.LATEST_VERSION }}"
          echo "Commit target build :>>> ${{ env.LAST_COMMITID }}"
          echo "Branch target build :>>> ${{ env.BUILD_BRANCH }}"
          
      - name: Set compiler
        run: |
          #set -e
          sudo xcode-select --switch /Applications/Xcode_16.4.app
          echo "export CC=gcc-14" >> ~/.bashrc
          echo "export CXX=g++-14" >> ~/.bashrc
          source ~/.bashrc
          
      - name: Remove default openssl
        run: |
          rm -rf "$BREW_PREFIX/opt/openssl"
          rm -rf "$BREW_PREFIX/include/openssl"
          
      # Cache Boost đã build. Key TÁCH THEO arch để bản Intel (x86_64) và arm64
      # KHÔNG dùng nhầm binary của nhau.
      - name: Cache Boost 1.81.0
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-1.81.0
          key: boost-1.81.0-${{ matrix.arch }}

      - name: Install dependencies
        # Chỉ build boost khi chưa có cache cho arch này.
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          mkdir -p $HOME/boost-1.81.0
          wget https://archives.boost.io/release/1.81.0/source/boost_1_81_0.tar.gz
          tar -xzf boost_1_81_0.tar.gz
          cd boost_1_81_0
          ./bootstrap.sh --prefix=$HOME/boost-1.81.0
          # Build song song theo số core (trước đây là -j1 -> rất chậm trên Intel).
          CORES=$(sysctl -n hw.ncpu)
          ./b2 install -j$CORES --prefix=$HOME/boost-1.81.0
          
      - name: Brew install remaining deps
        run: |
          export HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1
          export HOMEBREW_NO_AUTO_UPDATE=1
          # berkeley-db@4 được tham chiếu trong LDFLAGS/CPPFLAGS. Trên Intel có thể
          # sẵn, nhưng trên arm64 thường thiếu -> cài tường minh cho cả 2 kiến trúc.
          brew install libolm libevent berkeley-db@4
      
      - name: Install Qt 6.9.3
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.9.3'
          host: 'mac'
          # Module theo find_package(Qt6 ...) trong CMakeLists.txt của nunchuk-qt.
          # Các component còn lại (Core/CorePrivate/Gui/Widgets/Concurrent/Network/
          # Sql/PrintSupport = qtbase; Qml/Quick/QuickControls2 = qtdeclarative;
          # Svg = qtsvg) đã nằm trong bản base nên không cần liệt kê.
          # Cần thêm qua -m:
          #  - qtmultimedia   -> Qt6::Multimedia
          #  - qtwebengine    -> Qt6::WebEngineWidgets (USING_WEBENGINE=ON)
          #  - qtwebchannel + qtpositioning -> phụ thuộc bắt buộc của WebEngine
          #  - qt5compat -> QML "import Qt5Compat.GraphicalEffects" (thay QtGraphicalEffects
          #    của Qt5). Đây là import QML-only, KHÔNG xuất hiện trong find_package,
          #    nhưng thiếu thì QML gốc load fail -> app trắng màn hình.
          modules: 'qtmultimedia qtwebengine qtwebchannel qtpositioning qt5compat'

      - name: Configure Qt6 paths
        run: |
          # Qt6 trên macOS dùng thư mục kiến trúc "macos" (universal x86_64+arm64),
          # KHÔNG còn là "clang_64" như Qt5.
          QTPATH="${{ github.workspace }}/Qt/6.9.3/macos"
          echo "QTPATH=$QTPATH" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=$QTPATH/lib/cmake" >> $GITHUB_ENV
          echo "PATH=$QTPATH/bin:$PATH" >> $GITHUB_ENV
      - name: Install qtkeychain
        working-directory: ${{runner.workspace}}
        run: |
          QTPATH="${{ github.workspace }}/Qt/6.9.3/macos"
          git clone --depth 1 --branch 0.14.2 https://github.com/frankosterfeld/qtkeychain
          cd qtkeychain
          mkdir build && cd build
          # BUILD_WITH_QT6=ON: build qtkeychain cho Qt6 (mặc định vẫn là Qt5).
          cmake .. -DBUILD_WITH_QT6=ON -DCMAKE_PREFIX_PATH="$QTPATH/lib/cmake" -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          CORES=$(sysctl -n hw.ncpu)
          cmake --build . -j$CORES
          # Cài vào Homebrew prefix (Intel: /usr/local, arm64: /opt/homebrew)
          sudo cmake --install . --prefix "$BREW_PREFIX"
          
      # Cache OpenSSL đã build (thư mục lib output). Key tách theo arch.
      # Nếu bump phiên bản openssl vendored trong repo -> đổi hậu tố -v1 để invalidate.
      - name: Cache OpenSSL (contrib)
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ runner.workspace }}/nunchuk-qt/contrib/libnunchuk/contrib/openssl/lib
          key: openssl-contrib-${{ matrix.arch }}-v1

      - name: Build openssl
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        working-directory: ${{runner.workspace}}/nunchuk-qt/contrib/libnunchuk/contrib/openssl
        run: |
          set -e
          source ~/.bashrc
          ./config --prefix="$PWD/lib"
          CORES=$(sysctl -n hw.ncpu)
          make -j$CORES
          make install_dev
          
      - name: Build nunchuk-qt
        working-directory: ${{runner.workspace}}
        env:
          OPENSSL_ROOT_DIR: ${{runner.workspace}}/nunchuk-qt/contrib/libnunchuk/contrib/openssl/lib
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REDIRECT_URI: ${{ secrets.OAUTH_REDIRECT_URI }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          set -e
          QTPATH="${{ github.workspace }}/Qt/6.9.3/macos"
          export PATH="$QTPATH/bin:$PATH"
          export LDFLAGS="$LDFLAGS -L$QTPATH/lib -L$HOME/boost-1.81.0/lib -L$BREW_PREFIX/opt/berkeley-db@4/lib"
          export CPPFLAGS="$CPPFLAGS -I$QTPATH/include -I$HOME/boost-1.81.0/include -I$BREW_PREFIX/opt/berkeley-db@4/include -I$OPENSSL_ROOT_DIR/include"
          export BOOST_ROOT="$HOME/boost-1.81.0"
          export CXXFLAGS="$CXXFLAGS -O0"
          export CFLAGS="$CFLAGS -O0"
          cmake -E make_directory ${{runner.workspace}}/build
          cd build
          cmake ${{runner.workspace}}/nunchuk-qt \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="$QTPATH/lib/cmake;$BREW_PREFIX" \
                -DUR__DISABLE_TESTS=ON \
                -DBOOST_ROOT=$HOME/boost-1.81.0 \
                -DCMAKE_CXX_FLAGS="$CXXFLAGS" \
                -DCMAKE_C_FLAGS_RELEASE="$CFLAGS" \
                -DCMAKE_CXX_FLAGS_RELEASE="$CXXFLAGS" \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
                -DAPPEND_CPPFLAGS="-I$(brew --prefix libevent)/include"
          CORES=$(sysctl -n hw.ncpu)
          cmake --build . --config Release -j$CORES
          
      - name: Deploy Nunchuk
        working-directory: ${{runner.workspace}}/build
        env:
          APP_PATH: "${{runner.workspace}}/build/Nunchuk.app"
        run: |
          set -e
          source ~/.bashrc
          # Dùng macdeployqt của Qt6 vừa cài (QTPATH set ở bước Configure Qt6 paths),
          # KHÔNG dùng Homebrew qt@5.
          export PATH="$QTPATH/bin:$PATH"
          export LDFLAGS="$LDFLAGS -L$QTPATH/lib -L$HOME/boost-1.81.0/lib -L$BREW_PREFIX/opt/berkeley-db@4/lib"
          export CPPFLAGS="$CPPFLAGS -I$QTPATH/include -I$HOME/boost-1.81.0/include -I$BREW_PREFIX/opt/berkeley-db@4/include -I$OPENSSL_ROOT_DIR/include"
          export BOOST_ROOT="$HOME/boost-1.81.0"
          which macdeployqt
          find ${{runner.workspace}} -name "Nunchuk.app"
          macdeployqt $APP_PATH \
                      -executable=$APP_PATH/Contents/MacOS/Nunchuk \
                      -qmldir=${{runner.workspace}}/nunchuk-qt \
                      -always-overwrite

          # macdeployqt BỎ SÓT QtShaderTools.framework — đây là dependency của
          # libqtgraphicaleffectsprivateplugin.dylib (Qt5Compat.GraphicalEffects.private).
          # Thiếu nó -> OpacityMask/DropShadow fail -> chuỗi QML popup unavailable
          # -> app trắng màn hình. Copy tay vào Contents/Frameworks (rpath
          # @executable_path/../Frameworks đã resolve tới đây theo log dlopen).
          SHADERTOOLS_SRC="$QTPATH/lib/QtShaderTools.framework"
          SHADERTOOLS_DST="$APP_PATH/Contents/Frameworks/QtShaderTools.framework"
          if [ -d "$SHADERTOOLS_SRC" ] && [ ! -d "$SHADERTOOLS_DST" ]; then
            cp -R "$SHADERTOOLS_SRC" "$APP_PATH/Contents/Frameworks/"
            echo "✅ Copied QtShaderTools.framework vào app bundle"
          else
            echo "ℹ️ QtShaderTools.framework: src tồn tại=$( [ -d "$SHADERTOOLS_SRC" ] && echo yes || echo no ), dst đã có=$( [ -d "$SHADERTOOLS_DST" ] && echo yes || echo no )"
          fi
      - name: Patch QtWebEngineProcess dependencies
        working-directory: ${{runner.workspace}}/build
        env:
          APP_PATH: "${{runner.workspace}}/build/Nunchuk.app"
        run: |
          # Qt6: framework dùng "Versions/A" (Qt5 là "Versions/5").
          # Các thao tác install_name_tool được GUARD: -delete_rpath fail cứng
          # nếu rpath không tồn tại, mà layout rpath của Qt6 khác Qt5 -> chỉ
          # xoá/thêm/đổi khi thực sự có, và coi lỗi lành tính là non-fatal.
          HELPER_PATH="$APP_PATH/Contents/Frameworks/QtWebEngineCore.framework/Versions/A/Helpers/QtWebEngineProcess.app"
          HELPER_EXEC="$HELPER_PATH/Contents/MacOS/QtWebEngineProcess"
          HELPER_FRAMEWORKS="$HELPER_PATH/Contents/Frameworks"
          if [ ! -f "$HELPER_EXEC" ]; then
            echo "⚠️ Helper executable not found: $HELPER_EXEC — bỏ qua bước patch."
            exit 0
          fi
          echo "Helper executable found: $HELPER_EXEC"
          # Liệt kê rpath hiện có (dòng path ngay sau mỗi LC_RPATH).
          CURRENT_RPATHS=$(otool -l "$HELPER_EXEC" | awk '/cmd LC_RPATH/{f=1} f&&/path /{print $2; f=0}')
          OLD_RPATH="@executable_path/../Frameworks"
          NEW_RPATH="@executable_path/../../../../../../../../Frameworks"
          # Xoá rpath cũ chỉ khi tồn tại
          if echo "$CURRENT_RPATHS" | grep -qx "$OLD_RPATH"; then
            echo "🔧 Deleting old rpath $OLD_RPATH"
            install_name_tool -delete_rpath "$OLD_RPATH" "$HELPER_EXEC" || echo "⚠️ delete_rpath non-zero — bỏ qua"
          else
            echo "ℹ️ Old rpath $OLD_RPATH không có — skip delete"
          fi
          # Thêm rpath mới chỉ khi chưa có
          if echo "$CURRENT_RPATHS" | grep -qx "$NEW_RPATH"; then
            echo "ℹ️ New rpath đã có — skip add"
          else
            echo "🔧 Adding new rpath $NEW_RPATH"
            install_name_tool -add_rpath "$NEW_RPATH" "$HELPER_EXEC" || echo "⚠️ add_rpath non-zero — bỏ qua"
          fi
          # Đổi dependency Qt*.framework chỉ khi thực sự xuất hiện trong otool -L
          DEPS=$(otool -L "$HELPER_EXEC" | awk '{print $1}' | grep -E "Qt[^/]+\.framework" || true)
          if [ -z "$DEPS" ]; then
            echo "⚠️ No Qt dependencies found needing patch."
          else
            echo "$DEPS" | while read -r dep; do
              framework=$(echo "$dep" | sed -E 's|.*/(Qt[^/]+)\.framework.*|\1|')
              new_path="@executable_path/../../../../../../../${framework}.framework/Versions/A/${framework}"
              echo "🔧 Fixing: $dep → $new_path"
              install_name_tool -change "$dep" "$new_path" "$HELPER_EXEC" || echo "⚠️ change fail cho $dep — bỏ qua"
            done
          fi
          echo "✅ Done patching QtWebEngineProcess dependencies."
          echo "-- CHECK OTOOL AGAIN --"
          otool -L "$HELPER_EXEC"
        
      - name: Setup certification
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
          BUNDLE_IDENTIFIER: ${{ secrets.IO_BUNDLE_IDENTIFIER }}
          TEAMID_BUNDLE_IDENTIFIER: ${{ secrets.IO_TEAMID_BUNDLE_IDENTIFIER }}
          
        run: |
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain 
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security find-identity -v -p codesigning
          xcrun --find altool
          xcrun --find notarytool
          
      - name: Codesign app bundle
        working-directory: ${{runner.workspace}}/build
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
          APP: "Nunchuk"
          APP_PATH: "${{runner.workspace}}/build/Nunchuk.app"
          ENTITLEMENTS: ${{runner.workspace}}/nunchuk-qt/entitlements.plist
          ENTITLEMENTS_HWI: ${{runner.workspace}}/nunchuk-qt/entitlements_hwi.plist
        run: |
          set -euo pipefail # Dừng script nếu lỗi, bảo vệ biến chưa khai báo
          echo "Checking Developer ID"
          security find-identity -v -p codesigning
          echo "$MACOS_CERTIFICATE_NAME"
          
          echo "Signing internal components..."
          find "$APP_PATH" -type f \( -name "*.dylib" -o -name "*.so" -o -name "*.bundle" -o -name "*.plugin" \) -print0 | \
           while IFS= read -r -d '' file; do
             echo "$file" | tee /dev/stderr
             codesign --remove-signature "$file"
             codesign --deep --force --verify --options=runtime --verbose --timestamp --entitlements "$ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$file" -vvv
           done
          
          echo "Signing frameworks and Qt components..."
          find "$APP_PATH" -name "Qt*" -type f -print0 | \
           while IFS= read -r -d '' file; do
             echo "$file" | tee /dev/stderr
             codesign --remove-signature "$file"
             codesign --force --deep --verify --options=runtime --verbose --timestamp --entitlements "$ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$file" -vvv
           done
  
          echo "Signing Nunchuk"
          codesign --remove-signature "$APP_PATH/Contents/MacOS/Nunchuk"
          codesign --force --deep --verify --options=runtime --verbose --timestamp --entitlements "$ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$APP_PATH/Contents/MacOS/Nunchuk" -vvv
          
          echo "Copy hwi"
          cp "${{runner.workspace}}/hwi_macos/hwi" "$APP_PATH/Contents/MacOS/hwi"

          #echo "Signing QWebengineProcess executables..."
          #HELPER_PATH="$APP_PATH/Contents/Frameworks/QtWebEngineCore.framework/Versions/5/Helpers/QtWebEngineProcess.app"
          #HELPER_ENTITLEMENTS="$HELPER_PATH/Contents/Resources/QtWebEngineProcess.entitlements"
          #codesign --force --deep --verify --options=runtime --verbose --timestamp --entitlements "$HELPER_ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$HELPER_PATH" -vvv

          echo "Signing QWebengineProcess executables..."
          # Qt6: Versions/A (Qt5 là Versions/5)
          HELPER_PATH="$APP_PATH/Contents/Frameworks/QtWebEngineCore.framework/Versions/A/Helpers/QtWebEngineProcess.app"
          HELPER_ENTITLEMENTS="$HELPER_PATH/Contents/Resources/QtWebEngineProcess.entitlements"
          codesign --force --deep --verify --options=runtime --verbose --timestamp --entitlements "$HELPER_ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$HELPER_PATH" -vvv
         
          echo "Signing main executables and app bundle..."
          codesign --force --verify --options=runtime --verbose --timestamp --entitlements "$ENTITLEMENTS" -s "$MACOS_CERTIFICATE_NAME" "$APP_PATH" -vvv
    
          echo "Verifying codesigning $APP_PATH"
          codesign -vvvv --deep --strict "$APP_PATH"
          
          echo "Verifying codesigning integrity -dvvvvv ..."
          codesign -dvvvvv "$APP_PATH"
          
          echo "Verifying codesigning integrity... -vvvv --deep --strict "
          codesign -vvvv --deep --strict "$APP_PATH"

          echo "Verifying codesigning entitlements... d --entitlements "
          codesign -dvvvv --entitlements :- "$APP_PATH"

          echo "Check otool..."
          otool -L "$APP_PATH/Contents/MacOS/Nunchuk"
        
          echo "Cleaning up temporary files..."
          rm -f certificate.p12
 
      - name: Notarize app bundle
        working-directory: ${{runner.workspace}}/build
        env:
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.IO_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.IO_APPLE_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.IO_APPLE_APP_PASSWORD }}
          APP_PATH: "${{runner.workspace}}/build/Nunchuk.app"
        run: |
          set -euo pipefail # Dừng script nếu lỗi
      
          echo "Creating notarization profile..."
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" \
                                                                  --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" \
                                                                  --password "$PROD_MACOS_NOTARIZATION_PWD"
      
          echo "Packaging the app bundle..."
          zip_file="${{runner.workspace}}/build/notarization.zip"
          ditto -c -k --keepParent "$APP_PATH" "$zip_file"
      
          echo "Submitting app bundle for notarization..."
          # Retry: Apple notary hay trả 503 "Slow Down" và notarytool có thể tự
          # crash (Bus error) ở nhánh retry multipart -> đều là lỗi transient.
          # Thử lại tối đa 3 lần với backoff tăng dần; --timeout tránh treo vô hạn.
          max_attempts=3
          attempt=1
          until xcrun notarytool submit "$zip_file" \
                  --keychain-profile "notarytool-profile" \
                  --wait --timeout 30m --verbose; do
            status=$?
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "❌ Notarization thất bại sau $attempt lần thử (exit $status)"
              exit "$status"
            fi
            backoff=$((attempt * 60))
            echo "⚠️ Notarization lần $attempt lỗi (503/crash?) -> chờ ${backoff}s rồi thử lại..."
            sleep "$backoff"
            attempt=$((attempt + 1))
          done
          echo "✅ Notarization thành công (lần thử $attempt)."
      
          echo "Stapling notarization ticket to the app bundle..."
          xcrun stapler staple "$APP_PATH"
      
          echo "Validating the stapling..."
          xcrun stapler validate "$APP_PATH"
      
          echo "Performing Gatekeeper verification..."
          spctl -a -vvvv "$APP_PATH"
          spctl --assess --type exec --verbose=4 "$APP_PATH"

          timestamp=${{ env.TIMESTAMP }}
          final_package_dir="${{runner.workspace}}/$timestamp/nunchuk-macos-${{ matrix.arch }}"
          mkdir -p "$final_package_dir"
          echo "Repackaging the notarized app bundle to $final_package_dir"
          cp -R "$APP_PATH" "$final_package_dir/"

          # Chỉ tạo zip "-built" khi UPLOAD_BUILT=true (xem flag đầu file).
          if [ "$UPLOAD_BUILT" = "true" ]; then
            echo "Packaging built folder..."
            final_built_zip="/tmp/$timestamp/nunchuk-macos-${{ matrix.arch }}-built.zip"
            ditto -c -k --keepParent "$final_package_dir" "$final_built_zip"
          else
            echo "UPLOAD_BUILT=false -> bỏ qua tạo zip built."
          fi

      - name: Debug running processes
        run: lsof | grep "Nunchuk.dmg" || echo "No active processes using .dmg"

      - name: Eject all disk images
        run: |
          echo "diskutil list"
          diskutil list
          echo "diskutil list - with volume nunchuk-macos"
          diskutil list | grep -B 1 "nunchuk-macos" | grep -o "disk[0-9]*" | head -n 1 | sed 's/^/\/dev\//'
          for disk in $(diskutil list | grep -B 1 "nunchuk-macos" | grep -o "disk[0-9]*" | sed 's/^/\/dev\//'); do
            sudo diskutil eject $disk
            sleep 1
            if ! diskutil list | grep -q $disk; then
              echo "$disk already ejected"
            else
              echo "$disk ejected"
            fi
          done
      - name: Install appdmg
        run: npm install -g appdmg

      - name: Cleanup before appdmg
        run: |
          echo "📌 Volume status *before* detach:"
          mount | grep "/Volumes/Nunchuk" || echo "⛔️ Not mounted."
        
          # Unmount any mounted volume with same name
          (mount | grep -q "/Volumes/Nunchuk" && hdiutil detach "/Volumes/Nunchuk") || true          
          
          echo "📌 Volume status *after* detach:"
          mount | grep "/Volumes/Nunchuk" || echo "✅ Successfully detached (not found in mount list)."
          
          # Use custom temp dir to avoid /var/folders quirks
          export TMPDIR="${{runner.workspace}}/tmp"
          mkdir -p "$TMPDIR"
          
      - name: Create appdmg JSON configuration
        working-directory: ${{runner.workspace}}
        run: |
          timestamp=${{ env.TIMESTAMP }}
          final_dmg_dir="/tmp/$timestamp/nunchuk-macos-v${{ env.LATEST_VERSION }}"
          mkdir -p "$final_dmg_dir"
          final_package_dir="${{runner.workspace}}/$timestamp/nunchuk-macos-${{ matrix.arch }}"
          
          cat <<EOF > dmg.json
          {
            "title": "Nunchuk",
            "icon-size": 100,
            "window": {
              "position": {
                "x": 200,
                "y": 150
              },
              "size": {
                "width": 800,
                "height": 400
              }
            },
            "contents": [
              {
                "x": 200,
                "y": 200,
                "type": "file",
                "path": "$final_package_dir/Nunchuk.app"
              },
              {
                "x": 600,
                "y": 200,
                "type": "link",
                "path": "/Applications"
              }
            ]
          }
          EOF
          ls -la
          
      - name: Create DMG
        working-directory: ${{runner.workspace}}
        run: |
          timestamp=${{ env.TIMESTAMP }}
          final_dmg_dir="/tmp/$timestamp/nunchuk-macos-v${{ env.LATEST_VERSION }}"
          mkdir -p "$final_dmg_dir"
          final_package_dir="${{runner.workspace}}/$timestamp/nunchuk-macos-${{ matrix.arch }}"
          echo "Create DMG from source : $final_package_dir"
          echo "Create DMG to directory: $final_dmg_dir"
          appdmg dmg.json $final_dmg_dir/Nunchuk.dmg
          ls -la $final_dmg_dir
          
          final_package_zip="/tmp/$timestamp/nunchuk-macos-${{ matrix.arch }}-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}.zip"
          ditto -c -k --keepParent "$final_dmg_dir" "$final_package_zip"
      - name: Upload Nunchuk BUILT
        # Chỉ upload khi UPLOAD_BUILT=true (xem flag đầu file).
        if: env.UPLOAD_BUILT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nunchuk-macos-${{ matrix.arch }}-built
          path: /tmp/${{ env.TIMESTAMP }}/nunchuk-macos-${{ matrix.arch }}-built.zip

      - name: Upload Nunchuk DMG
        uses: 'actions/upload-artifact@v4'
        with:
          name: nunchuk-macos-${{ matrix.arch }}-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}
          path: /tmp/${{ env.TIMESTAMP }}/nunchuk-macos-${{ matrix.arch }}-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}.zip
