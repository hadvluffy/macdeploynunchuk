name: nunchuk-linux-matrix

env:
  QT_VERSION: '6.9.3'
  BOOST_VERSION: '1.81.0'
  UPLOAD_BUILT: 'false'

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
            elf_machine: x86-64
            qt_host: linux
            qt_arch: linux_gcc_64
            appimage_arch: x86_64
            hwi_mode: download
          - arch: arm64
            # Qt 6.9.3 ARM64 host tools (moc/rcc) yêu cầu GLIBC >= 2.38.
            runner: ubuntu-24.04-arm
            deb_arch: arm64
            elf_machine: ARM aarch64
            qt_host: linux_arm64
            qt_arch: linux_gcc_arm64
            appimage_arch: aarch64
            hwi_mode: build

    runs-on: ${{ matrix.runner }}
    timeout-minutes: 360

    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            curl \
            desktop-file-utils \
            file \
            git \
            libboost-all-dev \
            libdb++-dev \
            libevent-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libminizip-dev \
            libpulse-dev \
            libsecret-1-dev \
            libsqlite3-dev \
            libudev-dev \
            libusb-1.0-0-dev \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-util1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxkbcommon-x11-0 \
            libzmq3-dev \
            ninja-build \
            patchelf \
            python3-pip \
            sqlite3 \
            wget \
            zip

      - name: Install GCC 14
        run: |
          set -euo pipefail
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update
          sudo apt-get install -y gcc-14 g++-14

          CC_PATH=$(command -v gcc-14)
          CXX_PATH=$(command -v g++-14)
          AR_PATH=$(command -v gcc-ar-14)
          NM_PATH=$(command -v gcc-nm-14)
          RANLIB_PATH=$(command -v gcc-ranlib-14)

          for tool in "$CC_PATH" "$CXX_PATH" "$AR_PATH" "$NM_PATH" "$RANLIB_PATH"; do
            test -x "$tool" || {
              echo "ERROR: Compiler tool không tồn tại hoặc không executable: $tool"
              exit 1
            }
          done

          {
            echo "CC=$CC_PATH"
            echo "CXX=$CXX_PATH"
            echo "AR=$AR_PATH"
            echo "NM=$NM_PATH"
            echo "RANLIB=$RANLIB_PATH"
          } >> "$GITHUB_ENV"

          "$CC_PATH" --version
          "$CXX_PATH" --version
          "$AR_PATH" --version
          "$NM_PATH" --version
          "$RANLIB_PATH" --version

      - name: Install Qt 6.9.3
        run: |
          set -euo pipefail
          python3 -m pip install --user "aqtinstall==3.3.0"
          export PATH="$HOME/.local/bin:$PATH"

          AVAILABLE_ARCHES=$(aqt list-qt "${{ matrix.qt_host }}" desktop --arch "$QT_VERSION")
          echo "Qt architectures: $AVAILABLE_ARCHES"
          grep -qw "${{ matrix.qt_arch }}" <<< "$AVAILABLE_ARCHES"

          AVAILABLE_MODULES=$(aqt list-qt \
            "${{ matrix.qt_host }}" desktop \
            --modules "$QT_VERSION" "${{ matrix.qt_arch }}")
          for module in qtmultimedia qtwebengine qtwebchannel qtpositioning qt5compat; do
            grep -qw "$module" <<< "$AVAILABLE_MODULES" || {
              echo "ERROR: Qt module không tồn tại: $module"
              exit 1
            }
          done

          aqt install-qt \
            "${{ matrix.qt_host }}" desktop "$QT_VERSION" "${{ matrix.qt_arch }}" \
            --outputdir "$HOME/Qt" \
            -m qtmultimedia qtwebengine qtwebchannel qtpositioning qt5compat

          QMAKE_PATH=$(find "$HOME/Qt/$QT_VERSION" -type f \( -name qmake6 -o -name qmake \) -print -quit)
          test -n "$QMAKE_PATH"
          QTPATH=$(cd "$(dirname "$QMAKE_PATH")/.." && pwd)
          echo "QTPATH=$QTPATH" >> "$GITHUB_ENV"
          echo "CMAKE_PREFIX_PATH=$QTPATH/lib/cmake" >> "$GITHUB_ENV"
          echo "$QTPATH/bin" >> "$GITHUB_PATH"
          "$QMAKE_PATH" -query

      - name: Verify Qt WebEngine native dependencies
        run: |
          set -euo pipefail

          HOST_ARCH=$(dpkg --print-architecture)
          if [ "$HOST_ARCH" != "${{ matrix.deb_arch }}" ]; then
            echo "ERROR: Runner architecture là $HOST_ARCH, expected ${{ matrix.deb_arch }}."
            exit 1
          fi

          for package in libminizip-dev libminizip1t64; do
            PACKAGE_ARCH=$(dpkg-query -W -f='${Architecture}' "$package")
            PACKAGE_VERSION=$(dpkg-query -W -f='${Version}' "$package")
            if [ "$PACKAGE_ARCH" != "$HOST_ARCH" ]; then
              echo "ERROR: $package là $PACKAGE_ARCH, expected $HOST_ARCH."
              exit 1
            fi
            echo "$package $PACKAGE_VERSION $PACKAGE_ARCH"
          done

          mapfile -t MINIZIP_LIBS < <(
            ldconfig -p | awk '$1 == "libminizip.so.1" { print $NF }'
          )
          if [ "${#MINIZIP_LIBS[@]}" -ne 1 ]; then
            echo 'ERROR: Không tìm thấy đúng một native libminizip.so.1.'
            printf '%s\n' "${MINIZIP_LIBS[@]}"
            exit 1
          fi
          MINIZIP_LIB="${MINIZIP_LIBS[0]}"
          test -f "$MINIZIP_LIB"
          MINIZIP_FILE_INFO=$(file -L "$MINIZIP_LIB")
          echo "$MINIZIP_FILE_INFO"
          if ! grep -Fq '${{ matrix.elf_machine }}' <<< "$MINIZIP_FILE_INFO"; then
            echo 'ERROR: libminizip không đúng ELF architecture của matrix.'
            exit 1
          fi

          "$NM" -D --defined-only "$MINIZIP_LIB" \
            | awk '{ sub(/@.*/, "", $3); print $3 }' \
            > minizip-symbols.txt
          for symbol in \
            fill_fopen64_filefunc \
            zipWriteInFileInZip \
            zipOpenNewFileInZip4_64 \
            zipOpen2_64 \
            zipClose \
            zipCloseFileInZip; do
            if ! grep -qx "$symbol" minizip-symbols.txt; then
              echo "ERROR: $MINIZIP_LIB thiếu symbol $symbol."
              exit 1
            fi
          done

          WEBENGINE_CORE=$(find "$QTPATH/lib" -maxdepth 1 \
            -type f -name 'libQt6WebEngineCore.so.*' \
            -print -quit)
          test -n "$WEBENGINE_CORE"
          WEBENGINE_FILE_INFO=$(file -L "$WEBENGINE_CORE")
          echo "$WEBENGINE_FILE_INFO"
          if ! grep -Fq '${{ matrix.elf_machine }}' <<< "$WEBENGINE_FILE_INFO"; then
            echo 'ERROR: Qt WebEngineCore không đúng ELF architecture của matrix.'
            exit 1
          fi
          LD_LIBRARY_PATH="$QTPATH/lib" ldd "$WEBENGINE_CORE" \
            | tee qt-webengine-dependencies.txt
          if grep -q 'not found' qt-webengine-dependencies.txt; then
            echo 'ERROR: Qt WebEngineCore còn thiếu native shared library.'
            exit 1
          fi

      - name: Checkout nunchuk-qt
        working-directory: ${{ github.workspace }}/..
        env:
          GITLAB_PASS: ${{ secrets.GITLAB_PASS }}
        run: |
          set -euo pipefail
          printf 'machine gitlab.com\n  login tongvanlinhqhi\n  password %s\n' "$GITLAB_PASS" > "$HOME/.netrc"
          chmod 600 "$HOME/.netrc"

          TARGET_BRANCH="qt6"
          echo "BUILD_BRANCH=$TARGET_BRANCH" >> "$GITHUB_ENV"
          rm -rf nunchuk-qt
          git clone --branch "$TARGET_BRANCH" https://gitlab.com/nunchuck/nunchuck-qt nunchuk-qt
          cd nunchuk-qt
          git fetch --all --tags --prune
          git submodule sync --recursive
          git submodule update --init --recursive

          LAST_COMMITID=$(git rev-parse HEAD)
          LATEST_TAG=$(git for-each-ref --count=1 --sort=-taggerdate --format '%(refname:short)' refs/tags)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="0.0.0"
          fi
          echo "LAST_COMMITID=$LAST_COMMITID" >> "$GITHUB_ENV"
          echo "LATEST_VERSION=$LATEST_TAG" >> "$GITHUB_ENV"
          echo "Commit: $LAST_COMMITID"
          echo "Version: $LATEST_TAG"

      - name: Generate build metadata
        run: |
          echo "TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"
          echo "Architecture: ${{ matrix.arch }}"
          echo "Runner machine: $(uname -m)"

      - name: Download application icon
        working-directory: ${{ github.workspace }}/..
        run: |
          curl -fL --retry 3 \
            -o nunchuk-qt.png \
            https://raw.githubusercontent.com/hadvluffy/macdeploynunchuk/main/nunchuk-qt.png

      - name: Cache Boost 1.81.0
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ~/boost-1.81.0
          key: boost-1.81.0-linux-${{ matrix.arch }}-v1

      - name: Build Boost 1.81.0
        if: steps.cache-boost.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          curl -fL --retry 3 -o boost.tar.gz \
            https://archives.boost.io/release/1.81.0/source/boost_1_81_0.tar.gz
          tar -xzf boost.tar.gz
          cd boost_1_81_0
          ./bootstrap.sh --prefix="$HOME/boost-1.81.0"
          ./b2 install -j"$(nproc)" --prefix="$HOME/boost-1.81.0"

      - name: Build and install qtkeychain for Qt6
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          rm -rf qtkeychain
          git clone --depth 1 --branch 0.14.2 https://github.com/frankosterfeld/qtkeychain
          cmake -S qtkeychain -B qtkeychain/build -G Ninja \
            -DBUILD_WITH_QT6=ON \
            -DBUILD_TEST_APPLICATION=OFF \
            -DBUILD_TRANSLATIONS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QTPATH/lib/cmake" \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local"
          cmake --build qtkeychain/build --parallel "$(nproc)"
          cmake --install qtkeychain/build

      - name: Build and install Olm 3.2.16
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          rm -rf olm
          git clone --depth 1 --branch 3.2.16 https://gitlab.matrix.org/matrix-org/olm.git
          cmake -S olm -B olm/build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$HOME/.local" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build olm/build --parallel "$(nproc)"
          cmake --install olm/build

      - name: Cache OpenSSL contrib
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/../nunchuk-qt/contrib/libnunchuk/contrib/openssl/lib
          key: openssl-contrib-linux-${{ matrix.arch }}-v1

      - name: Build OpenSSL contrib
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        working-directory: ${{ github.workspace }}/../nunchuk-qt/contrib/libnunchuk/contrib/openssl
        run: |
          set -euo pipefail
          ./config --prefix="$PWD/lib"
          make -j"$(nproc)"
          make install_dev

      - name: Configure and build nunchuk-qt
        working-directory: ${{ github.workspace }}/..
        env:
          OPENSSL_ROOT_DIR: ${{ github.workspace }}/../nunchuk-qt/contrib/libnunchuk/contrib/openssl/lib
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REDIRECT_URI: ${{ secrets.OAUTH_REDIRECT_URI }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          set -euo pipefail
          export BOOST_ROOT="$HOME/boost-1.81.0"
          export CPPFLAGS="-I$OPENSSL_ROOT_DIR/include -I$BOOST_ROOT/include"
          export LDFLAGS="-L$OPENSSL_ROOT_DIR/lib -L$BOOST_ROOT/lib"

          cmake -S nunchuk-qt -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QTPATH/lib/cmake;$HOME/.local" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_AR="$AR" \
            -DCMAKE_NM="$NM" \
            -DCMAKE_RANLIB="$RANLIB" \
            -DOPENSSL_ROOT_DIR="$OPENSSL_ROOT_DIR" \
            -DBOOST_ROOT="$BOOST_ROOT" \
            -DUR__DISABLE_TESTS=ON \
            -DCMAKE_C_FLAGS_RELEASE="-O0 $CPPFLAGS" \
            -DCMAKE_CXX_FLAGS_RELEASE="-O0 $CPPFLAGS" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

          verify_cmake_tool() {
            cache_key="$1"
            expected_path="$2"
            configured_path=$(sed -n "s/^${cache_key}:[^=]*=//p" build/CMakeCache.txt)
            if [ -z "$configured_path" ]; then
              echo "ERROR: $cache_key không tồn tại trong CMakeCache.txt"
              exit 1
            fi
            if [ "$(realpath "$configured_path")" != "$(realpath "$expected_path")" ]; then
              echo "ERROR: $cache_key cấu hình sai: $configured_path (expected: $expected_path)"
              exit 1
            fi
            echo "$cache_key=$configured_path"
          }

          verify_cmake_tool CMAKE_AR "$AR"
          verify_cmake_tool CMAKE_NM "$NM"
          verify_cmake_tool CMAKE_RANLIB "$RANLIB"

          cmake --build build --parallel "$(nproc)"

          NUNCHUK_BINARY=$(find "$PWD/build" -type f -name nunchuk-qt -perm -111 -print -quit)
          test -n "$NUNCHUK_BINARY"
          echo "NUNCHUK_BINARY=$NUNCHUK_BINARY" >> "$GITHUB_ENV"
          file "$NUNCHUK_BINARY"

      - name: Download HWI x86_64
        if: matrix.hwi_mode == 'download'
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          mkdir -p hwi
          curl -fL --retry 3 -o hwi.tar.gz \
            https://github.com/nogibi/HWI/releases/download/3.2.0-displayaddress/hwi-3.2.0-linux-x86_64.tar.gz
          echo "ee7cf2afe085128c55ebaa1fb1da45831ae82a02f5b8c462c1dc95e6e606220a  hwi.tar.gz" | sha256sum -c -
          tar -xzf hwi.tar.gz -C hwi
          test -x hwi/hwi
          echo "HWI_BINARY=$PWD/hwi/hwi" >> "$GITHUB_ENV"
          file hwi/hwi

      - name: Build HWI arm64
        if: matrix.hwi_mode == 'build'
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          rm -rf hwi-src
          git clone --depth 1 --branch 3.2.0-displayaddress https://github.com/nogibi/HWI hwi-src
          cd hwi-src
          docker build -f contrib/build.Dockerfile -t nunchuk-hwi-arm64 .
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            nunchuk-hwi-arm64 \
            bash -c 'git config --global --add safe.directory /src && contrib/build_bin.sh --without-gui'

          HWI_BINARY=$(find "$PWD/dist" -path '*.tar.gz.dir/hwi' -type f -perm -111 -print -quit)
          test -n "$HWI_BINARY"
          echo "HWI_BINARY=$HWI_BINARY" >> "$GITHUB_ENV"
          file "$HWI_BINARY"

      - name: Download Linux deployment tools
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          curl -fL --retry 3 \
            -o linuxdeploy \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.appimage_arch }}.AppImage"
          curl -fL --retry 3 \
            -o linuxdeploy-plugin-qt \
            "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.appimage_arch }}.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-qt
          file linuxdeploy linuxdeploy-plugin-qt

      - name: Verify Qt XCB runtime dependencies
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          XCB_PLUGIN="$QTPATH/plugins/platforms/libqxcb.so"
          test -f "$XCB_PLUGIN"
          ldd "$XCB_PLUGIN" | tee qt-xcb-dependencies.txt
          if grep -q 'not found' qt-xcb-dependencies.txt; then
            echo 'ERROR: Qt XCB platform plugin còn thiếu shared library.'
            exit 1
          fi

      - name: Restrict Qt runtime plugins
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail

          restrict_plugins() {
            local plugin_dir="$1"
            shift
            local allowed_plugins=("$@")
            local plugin plugin_name allowed keep
            local remaining_plugins=()

            test -d "$plugin_dir"
            for allowed in "${allowed_plugins[@]}"; do
              test -f "$plugin_dir/$allowed" || {
                echo "ERROR: Plugin bắt buộc không tồn tại: $plugin_dir/$allowed"
                exit 1
              }
            done

            while IFS= read -r -d '' plugin; do
              plugin_name=$(basename "$plugin")
              keep=0
              for allowed in "${allowed_plugins[@]}"; do
                if [ "$plugin_name" = "$allowed" ]; then
                  keep=1
                  break
                fi
              done

              if [ "$keep" -eq 0 ]; then
                echo "Removing unused Qt plugin: $plugin"
                rm -f "$plugin"
              fi
            done < <(
              find "$plugin_dir" -maxdepth 1 \
                \( -type f -o -type l \) \
                -name '*.so*' -print0
            )

            mapfile -t remaining_plugins < <(
              find "$plugin_dir" -maxdepth 1 \
                \( -type f -o -type l \) \
                -name '*.so*' -printf '%f\n' | sort
            )
            if [ "${#remaining_plugins[@]}" -ne "${#allowed_plugins[@]}" ]; then
              echo "ERROR: Qt plugin whitelist sai tại $plugin_dir."
              printf '%s\n' "${remaining_plugins[@]}"
              exit 1
            fi
            for allowed in "${allowed_plugins[@]}"; do
              test -f "$plugin_dir/$allowed"
            done
          }

          # linuxdeploy-plugin-qt deploy toàn bộ plugin trong mỗi module.
          # Chỉ giữ backend thực sự dùng bởi ứng dụng desktop.
          restrict_plugins "$QTPATH/plugins/sqldrivers" \
            libqsqlite.so
          restrict_plugins "$QTPATH/plugins/multimedia" \
            libffmpegmediaplugin.so
          restrict_plugins "$QTPATH/plugins/position" \
            libqtposition_geoclue2.so \
            libqtposition_positionpoll.so

          ALLOWED_QT_PLUGINS=(
            "$QTPATH/plugins/sqldrivers/libqsqlite.so"
            "$QTPATH/plugins/multimedia/libffmpegmediaplugin.so"
            "$QTPATH/plugins/position/libqtposition_geoclue2.so"
            "$QTPATH/plugins/position/libqtposition_positionpoll.so"
          )

          : > qt-plugin-dependencies.txt
          : > missing-qt-plugin-dependencies.txt
          for plugin in "${ALLOWED_QT_PLUGINS[@]}"; do
            LDD_OUTPUT=$(LD_LIBRARY_PATH="$QTPATH/lib" ldd "$plugin" 2>&1 || true)
            {
              echo "===== $plugin ====="
              echo "$LDD_OUTPUT"
            } | tee -a qt-plugin-dependencies.txt
            if grep -q 'not found' <<< "$LDD_OUTPUT"; then
              {
                echo "===== $plugin ====="
                echo "$LDD_OUTPUT"
              } >> missing-qt-plugin-dependencies.txt
            fi
          done

          if [ -s missing-qt-plugin-dependencies.txt ]; then
            echo 'ERROR: Qt plugin trong whitelist còn thiếu shared library.'
            cat missing-qt-plugin-dependencies.txt
            exit 1
          fi

      - name: Create AppImage
        working-directory: ${{ github.workspace }}/..
        env:
          APPIMAGE_EXTRACT_AND_RUN: '1'
        run: |
          set -euo pipefail
          export PATH="$PWD:$QTPATH/bin:$PATH"
          export QMAKE="$QTPATH/bin/qmake6"
          if [ ! -x "$QMAKE" ]; then
            export QMAKE="$QTPATH/bin/qmake"
          fi
          export QML_SOURCES_PATHS="$PWD/nunchuk-qt"
          export NO_STRIP=1

          rm -rf AppDir
          mkdir -p AppDir/usr/bin
          install -m 755 "$HWI_BINARY" AppDir/usr/bin/hwi

          cat > nunchuk.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Nunchuk
          Comment=Bitcoin multisig wallet
          Exec=nunchuk-qt
          Icon=nunchuk-qt
          Categories=Utility;
          Terminal=false
          EOF

          ./linuxdeploy \
            --appdir AppDir \
            --executable "$NUNCHUK_BINARY" \
            --desktop-file nunchuk.desktop \
            --icon-file nunchuk-qt.png \
            --plugin qt

          # Cố định backend desktop và cấu hình QtWebEngine cho AppImage.
          sed -i '/^exec /i export QTWEBENGINE_DISABLE_SANDBOX=1' AppDir/AppRun
          sed -i '/^exec /i export QT_MEDIA_BACKEND=ffmpeg' AppDir/AppRun

          export VERSION="${LATEST_VERSION#v}"
          export ARCH="${{ matrix.appimage_arch }}"
          ./linuxdeploy --appdir AppDir --output appimage

          GENERATED_APPIMAGE=$(find "$PWD" -maxdepth 1 -type f -name '*.AppImage' -print -quit)
          test -n "$GENERATED_APPIMAGE"
          FINAL_APPIMAGE="$PWD/nunchuk-linux-${{ matrix.arch }}-v${LATEST_VERSION}_${BUILD_BRANCH}_${TIMESTAMP}.AppImage"
          mv "$GENERATED_APPIMAGE" "$FINAL_APPIMAGE"
          echo "FINAL_APPIMAGE=$FINAL_APPIMAGE" >> "$GITHUB_ENV"

      - name: Verify AppImage contents
        working-directory: ${{ github.workspace }}/..
        run: |
          set -euo pipefail
          file "$FINAL_APPIMAGE"

          rm -rf AppImageExtract
          mkdir AppImageExtract
          (
            cd AppImageExtract
            "$FINAL_APPIMAGE" --appimage-extract >/dev/null
          )
          BUNDLE_ROOT="$PWD/AppImageExtract/squashfs-root"

          test -x "$BUNDLE_ROOT/usr/bin/hwi"
          test -x "$BUNDLE_ROOT/usr/bin/nunchuk-qt"
          file "$BUNDLE_ROOT/usr/bin/hwi" "$BUNDLE_ROOT/usr/bin/nunchuk-qt"
          desktop-file-validate --no-hints \
            "$BUNDLE_ROOT/usr/share/applications/nunchuk.desktop"

          verify_plugin_set() {
            local plugin_dir="$1"
            shift
            local expected_plugins=("$@")
            local expected
            local actual_plugins=()

            test -d "$plugin_dir"
            mapfile -t actual_plugins < <(
              find "$plugin_dir" -maxdepth 1 \
                \( -type f -o -type l \) \
                -name '*.so*' -printf '%f\n' | sort
            )
            if [ "${#actual_plugins[@]}" -ne "${#expected_plugins[@]}" ]; then
              echo "ERROR: AppImage chứa plugin ngoài whitelist tại $plugin_dir."
              printf '%s\n' "${actual_plugins[@]}"
              exit 1
            fi
            for expected in "${expected_plugins[@]}"; do
              test -f "$plugin_dir/$expected" || {
                echo "ERROR: AppImage thiếu plugin $plugin_dir/$expected"
                exit 1
              }
            done
          }

          verify_plugin_set "$BUNDLE_ROOT/usr/plugins/sqldrivers" \
            libqsqlite.so
          verify_plugin_set "$BUNDLE_ROOT/usr/plugins/multimedia" \
            libffmpegmediaplugin.so
          verify_plugin_set "$BUNDLE_ROOT/usr/plugins/position" \
            libqtposition_geoclue2.so \
            libqtposition_positionpoll.so

          grep -qx 'export QT_MEDIA_BACKEND=ffmpeg' "$BUNDLE_ROOT/AppRun"

          : > missing-elf-dependencies.txt
          while IFS= read -r -d '' ELF_FILE; do
            if ! file -b "$ELF_FILE" | grep -q 'ELF'; then
              continue
            fi

            LDD_OUTPUT=$(
              LD_LIBRARY_PATH="$BUNDLE_ROOT/usr/lib" ldd "$ELF_FILE" 2>&1 || true
            )
            if grep -q 'not found' <<< "$LDD_OUTPUT"; then
              {
                echo "===== $ELF_FILE ====="
                echo "$LDD_OUTPUT"
              } | tee -a missing-elf-dependencies.txt
            fi
          done < <(find "$BUNDLE_ROOT" -type f -print0)

          if [ -s missing-elf-dependencies.txt ]; then
            echo 'ERROR: AppImage còn ELF thiếu shared library; xem báo cáo phía trên.'
            exit 1
          fi

      - name: Zip built AppDir
        if: env.UPLOAD_BUILT == 'true'
        working-directory: ${{ github.workspace }}/..
        run: |
          zip -r "nunchuk-linux-${{ matrix.arch }}-built.zip" AppDir

      - name: Upload Nunchuk AppImage
        uses: actions/upload-artifact@v4
        with:
          name: nunchuk-linux-${{ matrix.arch }}-v${{ env.LATEST_VERSION }}_${{ env.BUILD_BRANCH }}_${{ env.TIMESTAMP }}
          path: ${{ env.FINAL_APPIMAGE }}
          if-no-files-found: error

      - name: Upload built AppDir
        if: env.UPLOAD_BUILT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nunchuk-linux-${{ matrix.arch }}-built
          path: ${{ github.workspace }}/../nunchuk-linux-${{ matrix.arch }}-built.zip
          if-no-files-found: error
